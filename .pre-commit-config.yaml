repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.19
    hooks:
      # Run the linter.
      - id: ruff-check
        # want to check for commented out code when linting, but ignore for commit
        args: [--extend-ignore, ERA001]
      # Run the formatter.
      - id: ruff-format
